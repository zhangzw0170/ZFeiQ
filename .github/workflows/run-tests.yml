name: Run tests

on:
  push:
    branches: [ "dev", "main", "master" ]
  pull_request:
    branches: [ "dev", "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies (if any)
        run: |
          set -e
          if [ -f ZFeiQ_Original/requirements.txt ]; then
            python -m pip install --upgrade pip
            pip install -r ZFeiQ_Original/requirements.txt
          elif [ -f requirements.txt ]; then
            python -m pip install --upgrade pip
            pip install -r requirements.txt
          else
            echo "No requirements file found, skipping pip install"
          fi

      - name: Run test scripts
        run: |
          set -e
          echo "Running test scripts in ZFeiQ_Original/tests"
          for t in ZFeiQ_Original/tests/test_*.py; do
            if [ -f "$t" ]; then
              echo "--- Running $t ---"
              python3 "$t"
            fi
          done
